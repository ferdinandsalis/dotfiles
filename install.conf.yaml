- defaults:
    link:
      create: true
      relink: true

- create:
    - ~/.ssh
    - ~/.config
    - ~/projects
    - ~/work

- clean: ["~"]

- link:
    ~/.dotfiles: ""
    ~/.tmux.conf: tmux/.tmux.conf
    ~/.zshrc: zsh/zshrc
    ~/.zshenv: zsh/zshenv
    ~/.zprofile: zsh/zprofile
    ~/.vimrc: vim/vimrc
    ~/.gitconfig: git/gitconfig
    ~/.gitmessage: git/gitmessage
    ~/.config/nvim: nvim
    ~/Library/Application Support/lazygit/config.yml:
      if: "[ `uname` = Darwin ]"
      path: lazygit/config.yml
    ~/.config/direnv: direnv
    ~/.config/bat: bat
    ~/.config/kitty:
      force: true
      path: kitty
    ~/.config/karabiner:
      force: true
      path: karabiner

- shell:
    - [git submodule update --init --recursive, Installing submodules]
